<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Widget Preview</title>
    <style id="botforge-styles">
        .bf-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999999;
            font-family: 'Outfit', system-ui, sans-serif;
        }

        .bf-widget-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: transform 0.3s;
        }

        .bf-widget-button:hover {
            transform: scale(1.1);
        }

        .bf-chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 380px;
            height: 500px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .bf-chat-window.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .bf-chat-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .bf-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
        }

        .bf-chat-title {
            flex: 1;
        }

        .bf-chat-title h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .bf-chat-title span {
            font-size: 12px;
            opacity: 0.7;
        }

        .bf-close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.5;
            padding: 4px;
        }

        .bf-close-btn:hover {
            opacity: 1;
        }

        .bf-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bf-message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bf-message.bot {
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .bf-message.user {
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bf-typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.05);
            border-radius: 16px;
            width: fit-content;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .bf-typing span {
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .bf-typing span:nth-child(2) { animation-delay: 0.2s; }
        .bf-typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .bf-input-area {
            padding: 16px;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .bf-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .bf-input:focus {
            border-color: var(--bf-primary, #6366f1);
        }

        .bf-send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
        }

        .bf-send-btn:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <!-- BotForge Widget Demo -->
    <div class="bf-widget" id="bfWidget">
        <div class="bf-chat-window" id="bfChatWindow">
            <div class="bf-chat-header" id="bfHeader">
                <div class="bf-avatar" id="bfAvatar">AI</div>
                <div class="bf-chat-title">
                    <h3 id="bfTitle">AI Assistant</h3>
                    <span id="bfStatus">Online</span>
                </div>
                <button class="bf-close-btn" onclick="bfToggleChat()">✕</button>
            </div>
            <div class="bf-messages" id="bfMessages">
                <div class="bf-message bot" id="bfWelcomeMsg">Hi! How can I help you today?</div>
            </div>
            <div class="bf-input-area">
                <input type="text" class="bf-input" id="bfInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter')bfSendMessage()">
                <button class="bf-send-btn" id="bfSendBtn" onclick="bfSendMessage()">➤</button>
            </div>
        </div>
        <button class="bf-widget-button" id="bfWidgetBtn" onclick="bfToggleChat()">💬</button>
    </div>

    <script>
        // BotForge Widget Configuration
        const bfConfig = {
            primaryColor: '#6366f1',
            botBubbleColor: '#6366f1',
            userBubbleColor: '#1e1e2e',
            botTextColor: '#ffffff',
            userTextColor: '#ffffff',
            backgroundColor: '#ffffff',
            title: 'AI Assistant',
            welcomeMessage: 'Hi! How can I help you today?',
            position: 'bottom-right'
        };

        // Apply styles
        function bfApplyStyles() {
            const styles = document.getElementById('botforge-styles');
            const widgetBtn = document.getElementById('bfWidgetBtn');
            const chatWindow = document.getElementById('bfChatWindow');
            const avatar = document.getElementById('bfAvatar');
            const welcomeMsg = document.getElementById('bfWelcomeMsg');
            const userMsg = document.querySelector('.bf-message.user');
            const sendBtn = document.getElementById('bfSendBtn');
            const input = document.getElementById('bfInput');
            const header = document.getElementById('bfHeader');
            
            widgetBtn.style.background = bfConfig.primaryColor;
            avatar.style.background = bfConfig.primaryColor;
            welcomeMsg.style.background = bfConfig.botBubbleColor;
            welcomeMsg.style.color = bfConfig.botTextColor;
            sendBtn.style.background = bfConfig.primaryColor;
            chatWindow.style.background = bfConfig.backgroundColor;
            
            if (bfConfig.position === 'bottom-left') {
                chatWindow.style.right = 'auto';
                chatWindow.style.left = '0';
                widgetBtn.style.right = '20px';
                widgetBtn.style.left = '20px';
            }
        }

        function bfToggleChat() {
            const window = document.getElementById('bfChatWindow');
            window.classList.toggle('open');
        }

        function bfAddMessage(text, sender = 'bot') {
            const messages = document.getElementById('bfMessages');
            const msg = document.createElement('div');
            msg.className = `bf-message ${sender}`;
            msg.textContent = text;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        function bfShowTyping() {
            const messages = document.getElementById('bfMessages');
            const typing = document.createElement('div');
            typing.className = 'bf-typing';
            typing.id = 'bfTyping';
            typing.innerHTML = '<span></span><span></span><span></span';
            messages.appendChild(typing);
            messages.scrollTop = messages.scrollHeight;
        }

        function bfHideTyping() {
            const typing = document.getElementById('bfTyping');
            if (typing) typing.remove();
        }

        async function bfSendMessage() {
            const input = document.getElementById('bfInput');
            const text = input.value.trim();
            if (!text) return;

            bfAddMessage(text, 'user');
            input.value = '';

            bfShowTyping();
            
            // Simulate AI response (replace with actual API call)
            setTimeout(() => {
                bfHideTyping();
                bfAddMessage('Thanks for your message! This is a demo. In production, connect to GPT-4, Claude, or your own AI backend.', 'bot');
            }, 1500);
        }

        // Initialize
        bfApplyStyles();
    </script>
</body>
</html>
