<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - BotForge</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0c0c1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: #151528; padding: 2rem; border-radius: 12px; max-width: 400px; width: 100%; text-align: center; }
        h1 { margin-bottom: 1rem; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .btn { background: #8b5cf6; color: white; border: none; padding: 1rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-bottom: 1rem; }
        .btn:hover { background: #7c3aed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧊 BotForge Checkout</h1>
        <p id="status">Loading...</p>
        <button id="checkoutBtn" class="btn">Proceed to Payment</button>
    </div>
    
    <script>
        // Get plan from URL
        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan') || 'starter';
        
        // Stripe Payment Links
        const paymentLinks = {
            basic: { name: 'Basic', price: '$19.99/mo', url: 'https://buy.stripe.com/test_bJe4gz8Bm89b2vi7B5efC0a' },
            starter: { name: 'Starter', price: '$29.99/mo', url: 'https://buy.stripe.com/test_9B67sL5paexz0nabRlefC0b' },
            professional: { name: 'Professional', price: '$79.99/mo', url: 'https://buy.stripe.com/test_eVq7sLdVG9dfd9W7B5efC0c' },
            enterprise: { name: 'Enterprise', price: '$199.99/mo', url: 'https://buy.stripe.com/test_fZu14n18UfBDc5Sg7BefC0d' }
        };
        
        const selectedPlan = paymentLinks[plan] || paymentLinks.starter;
        
        document.getElementById('status').textContent = selectedPlan.name + ' Plan - ' + selectedPlan.price;
        
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            window.location.href = selectedPlan.url;
        });
    </script>
</body>
</html>
