<!DOCTYPE html>
<html lang="en">
<head>

        .icon { font-size: 4rem; margin-bottom: 1rem; }

        .btn { display: inline-block; padding: 1rem 2rem; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 1rem; background: var(--primary); color: white; }

</head>
